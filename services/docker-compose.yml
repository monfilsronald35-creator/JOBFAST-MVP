version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: jobfast-postgres
    environment:
      POSTGRES_USER: jobfast
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jobfast_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jobfast-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobfast"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: jobfast-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jobfast-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: jobfast-api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobfast:password@postgres:5432/jobfast_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

  # Auth Service
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: jobfast-auth-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobfast:password@postgres:5432/jobfast_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

  # User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: jobfast-user-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobfast:password@postgres:5432/jobfast_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

  # Job Service
  job-service:
    build:
      context: ./job-service
      dockerfile: Dockerfile
    container_name: jobfast-job-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobfast:password@postgres:5432/jobfast_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

  # Business Service
  business-service:
    build:
      context: ./business-service
      dockerfile: Dockerfile
    container_name: jobfast-business-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobfast:password@postgres:5432/jobfast_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

  # Wallet Service
  wallet-service:
    build:
      context: ./wallet-service
      dockerfile: Dockerfile
    container_name: jobfast-wallet-service
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobfast:password@postgres:5432/jobfast_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

  # Virtual Card Service
  virtual-card-service:
    build:
      context: ./virtual-card-service
      dockerfile: Dockerfile
    container_name: jobfast-virtual-card-service
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobfast:password@postgres:5432/jobfast_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

  # Notification Service
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: jobfast-notification-service
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobfast:password@postgres:5432/jobfast_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

  # AI Personalization Service
  ai-personalization-service:
    build:
      context: ./ai-personalization-service
      dockerfile: Dockerfile
    container_name: jobfast-ai-personalization-service
    ports:
      - "3008:3008"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobfast:password@postgres:5432/jobfast_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

  # Fraud Service
  fraud-service:
    build:
      context: ./fraud-service
      dockerfile: Dockerfile
    container_name: jobfast-fraud-service
    ports:
      - "3009:3009"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobfast:password@postgres:5432/jobfast_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

  # Search Service
  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: jobfast-search-service
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobfast:password@postgres:5432/jobfast_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

  # Analytics Service
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: jobfast-analytics-service
    ports:
      - "3011:3011"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobfast:password@postgres:5432/jobfast_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

  # Admin Service
  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: jobfast-admin-service
    ports:
      - "3012:3012"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://jobfast:password@postgres:5432/jobfast_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

  # Socket.io Server
  socket-server:
    build:
      context: ./notification-service
      dockerfile: Dockerfile.socket
    container_name: jobfast-socket-server
    ports:
      - "3013:3013"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - jobfast-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  jobfast-network:
    driver: bridge
