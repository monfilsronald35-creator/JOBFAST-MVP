<!DOCTYPE html>
<html lang="ht">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon + standard icon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- iOS / Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JobFast" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#050B18" />
    <meta name="msapplication-TileColor" content="#050B18" />
    <meta name="msapplication-TileImage" content="/icons/icon-192x192.png" />

    <!-- SEO / Social -->
    <meta name="description" content="Platfòm GPS elit pou jwenn djòb, travayè, sèvis ak biznis ann Ayiti." />
    <meta name="keywords" content="jobfast, djob, travay, haiti, services, plombier, electricien" />
    <meta property="og:title" content="JobFast Global Marketplace" />
    <meta property="og:description" content="Jwenn djòb, travayè, sèvis ann Ayiti." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <title>JobFast Global Marketplace</title>
  </head>
  <body class="bg-navy-950 text-slate-100">
    <div id="root">
      <!-- Native app shell: shows immediately while JS downloads, disappears when React mounts -->
      <div id="jf-shell" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#050B18;z-index:9999;">
        <div style="font-size:2.25rem;font-weight:900;letter-spacing:-0.02em;line-height:1;">
          <span style="color:#FACC15;">JOB</span><span style="color:#ffffff;">FAST</span>
        </div>
        <div style="width:48px;height:3px;background:#FACC15;border-radius:2px;margin-top:18px;animation:jf-pulse 1.4s ease-in-out infinite;"></div>
      </div>
    </div>
    <style>
      @keyframes jf-pulse { 0%,100%{opacity:1;transform:scaleX(1)} 50%{opacity:0.35;transform:scaleX(0.55)} }
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
