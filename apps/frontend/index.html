  <body>
    <div id="root">
      <!-- Splash shell: visibl imedyatman pandan JS chaje. #050B18 = zero white flash -->
      <div id="jf-shell" style="
        position:fixed;inset:0;display:flex;flex-direction:column;
        align-items:center;justify-content:center;background:#050B18;z-index:9999;
      ">
        <img src="/icons/icon-192x192.png" alt="JOBFAST" width="80" height="80"
          style="border-radius:20px;margin-bottom:20px;"
          onerror="this.style.display='none'" />
        <div style="font-size:2rem;font-weight:900;letter-spacing:-0.02em;line-height:1;">
          <span style="color:#FACC15;">JOB</span><span style="color:#fff;">FAST</span>
        </div>
        <div style="width:48px;height:3px;background:#FACC15;border-radius:2px;
          margin-top:20px;animation:jf-pulse 1.4s ease-in-out infinite;"></div>
        <style>
          @keyframes jf-pulse{0%,100%{opacity:1;transform:scaleX(1)}50%{opacity:.35;transform:scaleX(.55)}}
          body{margin:0;background:#050B18;}
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
