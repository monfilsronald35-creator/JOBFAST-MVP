<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- ====================================================== -->
    <!-- 🚀 SEO -->
    <!-- ====================================================== -->

    <title>JOBFAST GLOBAL</title>

    <meta
      name="description"
      content="JOBFAST GLOBAL - Construction, services, businesses, workers, and on-demand marketplace platform"
    />

    <meta
      name="robots"
      content="index, follow"
    />

    <meta
      name="author"
      content="JOBFAST GLOBAL"
    />

    <!-- ====================================================== -->
    <!-- 📱 MOBILE / PWA -->
    <!-- ====================================================== -->

    <meta
      name="theme-color"
      content="#0f172a"
    />

    <meta
      name="color-scheme"
      content="dark light"
    />

    <meta
      name="format-detection"
      content="telephone=no"
    />

    <!-- ====================================================== -->
    <!-- ⚡ PERFORMANCE -->
    <!-- ====================================================== -->

    <link
      rel="icon"
      href="/favicon.ico"
    />

    <link
      rel="dns-prefetch"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <!-- ====================================================== -->
    <!-- 🎨 GLOBAL STYLES -->
    <!-- ====================================================== -->

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        height: 100%;
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;

        min-height: 100vh;

        font-family:
          Arial,
          sans-serif;

        background: #0f172a;

        color: #ffffff;

        -webkit-font-smoothing:
          antialiased;

        -moz-osx-font-smoothing:
          grayscale;

        text-rendering:
          optimizeLegibility;
      }

      #root {
        min-height: 100dvh;

        display: flex;

        flex-direction: column;

        isolation: isolate;
      }
    </style>
  </head>

  <body>

    <!-- ====================================================== -->
    <!-- 🚀 REACT ROOT -->
    <!-- ====================================================== -->

    <div id="root"></div>

    <!-- ====================================================== -->
    <!-- 🚀 MAIN ENTRY -->
    <!-- ====================================================== -->

    <script
      type="module"
      src="/src/main.jsx"
    ></script>

    <!-- ====================================================== -->
    <!-- ⚠️ NOSCRIPT -->
    <!-- ====================================================== -->

    <noscript>
      This application requires JavaScript
      to run properly.
    </noscript>

  </body>
</html>
