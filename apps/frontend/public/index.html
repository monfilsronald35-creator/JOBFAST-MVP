<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>JOBFAST — Construction, Services & Business GPS Platform</title>
    <meta name="description" content="JOBFAST - Platfòm GPS elit pou konstriksyon, sèvis sou demann ak anyè biznis." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="JOBFAST Global Enterprise" />

    <meta name="theme-color" content="#020617" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="icon" href="/favicon.ico" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        height: 100%;
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
        background: #020617;
      }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: #020617;
        color: #f8fafc;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
      }
      #root {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        isolation: isolate;
      }
    </style>
  </head>

  <body>
    <noscript>
      <div style="font-family: 'Inter', sans-serif; text-align: center; padding: 60px 20px; background: #020617; color: #f8fafc; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px;">
        <h2 style="color: #f59e0b; font-weight: 700; font-size: 1.8rem;">JavaScript obligatwa pou JOBFAST fonksyone.</h2>
        <p style="color: #94a3b8; max-width: 400px; font-size: 0.95rem; line-height: 1.5;">
          Platfòm nan itilize sistèm GPS an tan reyèl ak sekirite avanse ki mande JavaScript. Tanpri aktive li nan paramèt navigatè ou pou ou ka kontinye.
        </p>
      </div>
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
