<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>JOBFAST — Pa Konekte</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #050B18;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      gap: 20px;
    }
    .logo {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }
    .logo span:first-child { color: #FACC15; }
    .icon {
      font-size: 4rem;
      line-height: 1;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 800;
      color: #fff;
      margin-top: 8px;
    }
    p {
      font-size: 0.875rem;
      color: #64748b;
      max-width: 280px;
      line-height: 1.6;
    }
    button {
      margin-top: 8px;
      padding: 14px 32px;
      background: #FACC15;
      color: #050B18;
      border: none;
      border-radius: 16px;
      font-size: 0.875rem;
      font-weight: 900;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: 0.85; transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>JOB</span><span style="color:#fff">FAST</span></div>
    <div class="icon">📡</div>
    <h1>Pa gen koneksyon entènèt</h1>
    <p>Tcheke koneksyon WiFi oswa done selilè ou, epi eseye ankò.</p>
    <button onclick="window.location.reload()">Eseye Ankò</button>
  </div>
</body>
</html>
